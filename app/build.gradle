apply plugin: 'com.android.application'
android {
    namespace 'com.my.netindicator'
    compileSdk 34
    defaultConfig {
        applicationId "com.my.netindicator"
        minSdk 26
        targetSdk 34
        versionCode 8
        versionName "1.0"
    }
}

android {
    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
    }
}
